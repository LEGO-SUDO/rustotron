name: Audit

on:
  schedule:
    # Run every Monday at 09:00 UTC. Pick up RustSec advisories without
    # needing a fresh push.
    - cron: "0 9 * * 1"
  push:
    paths:
      # Re-audit on every Cargo.lock change so you find out about a
      # vulnerable dep at PR time, not next Monday.
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write # actions-rs/audit-check opens an issue on advisory hits

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
