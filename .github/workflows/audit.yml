name: Audit

on:
  schedule:
    # Run every Monday at 09:00 UTC. Pick up RustSec advisories without
    # needing a fresh push.
    - cron: "0 9 * * 1"
  push:
    paths:
      # Re-audit on every Cargo.lock change so you find out about a
      # vulnerable dep at PR time, not next Monday.
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  workflow_dispatch:

permissions:
  contents: read
  checks: write # rustsec/audit-check posts a check-run with advisory findings
  issues: write # and opens an issue on advisory hits

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Accepted transitive advisories, all unmaintained/unsound warnings
          # from ratatui (0.29) and syntect (5.3) dep trees. No upstream fix
          # without changing those crates — revisit when we bump either major.
          #   RUSTSEC-2024-0436  paste (ratatui)        unmaintained
          #   RUSTSEC-2024-0320  yaml-rust (syntect)    unmaintained
          #   RUSTSEC-2026-0002  lru (ratatui)          unsound IterMut
          #   RUSTSEC-2025-0141  bincode (syntect)      unmaintained
          ignore: RUSTSEC-2024-0436,RUSTSEC-2024-0320,RUSTSEC-2026-0002,RUSTSEC-2025-0141
