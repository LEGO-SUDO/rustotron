# Release workflow — placeholder until you run `cargo dist init`.
#
# `cargo dist init` will OVERWRITE this file with the canonical
# multi-platform release pipeline derived from dist-workspace.toml. The
# file you see below is a minimal release-on-tag scaffold so the repo
# has *something* coherent before the cargo-dist bootstrap runs.
#
# After bootstrap you'll get:
#   - per-target build matrix (linux gnu/musl, macOS x86_64/aarch64)
#   - GitHub Release attachments
#   - Homebrew tap formula update (LEGO-SUDO/homebrew-rustotron)
#   - sigstore attestations
#   - shell installer published to the release
#   - crates.io publish (gated on CARGO_REGISTRY_TOKEN secret)
#
# Until then this scaffold builds + uploads a single per-OS binary so
# you can dry-run the tag workflow.

name: Release (scaffold)

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"   # prerelease tags
  workflow_dispatch:

permissions:
  contents: write   # needed for creating GH releases + uploading assets

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --locked
      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          BIN_NAME=rustotron
          PKG_NAME="${BIN_NAME}-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "dist/${PKG_NAME}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${PKG_NAME}/"
          cp README.md LICENSE-APACHE LICENSE-MIT "dist/${PKG_NAME}/"
          tar -czf "dist/${PKG_NAME}.tar.gz" -C dist "${PKG_NAME}"
          (cd dist && shasum -a 256 "${PKG_NAME}.tar.gz" > "${PKG_NAME}.tar.gz.sha256")
      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 7

  release:
    name: GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          draft: true   # default to draft so you can edit notes before publishing
          prerelease: ${{ contains(github.ref_name, '-') }}

  # Disabled until you've reserved the crate name and added the
  # CARGO_REGISTRY_TOKEN secret on the repo. Uncomment + cut a release
  # when ready (one-way: every subsequent tag will publish).
