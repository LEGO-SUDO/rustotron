# cargo-dist configuration.
#
# Generates per-target binaries on every `v*.*.*` tag, attaches them to the
# GitHub release, and updates the Homebrew tap formula. The actual workflow
# lives at .github/workflows/release.yml — generated by `cargo dist init`
# the first time you run it (run the commands at the bottom of this file).
#
# Docs: https://opensource.axo.dev/cargo-dist/

[workspace]
members = ["packages/*"]

[dist]
# Pin the cargo-dist version so the generated workflow stays reproducible
# until you opt into an upgrade.
cargo-dist-version = "0.21.1"

# Distribution targets. PRD NFR-17: Linux + macOS at launch, Windows post-v1.
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",       # static binary for Alpine, etc.
    "aarch64-unknown-linux-musl",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]

# CI provider — only GitHub at v1.
ci = ["github"]

# Installer flavours. The shell + powershell installers come from
# cargo-dist's built-in templates; the Homebrew installer pushes a
# formula to the tap repo declared below.
installers = ["shell", "homebrew"]

# Homebrew tap repository — must already exist (create it as
# `LEGO-SUDO/homebrew-rustotron` on GitHub before tagging the first
# release). cargo-dist commits the rendered formula here on each release.
tap = "LEGO-SUDO/homebrew-rustotron"

# Auto-publish to crates.io on tag. Requires CARGO_REGISTRY_TOKEN set as
# a GitHub Actions secret on the rustotron repo.
publish-jobs = ["./publish-crates"]

# Use a custom GitHub Releases body that links back to the changelog.
github-release = "auto"

# Sign release artefacts with sigstore (cosign). Verifiers can run
# `cosign verify-blob --certificate-identity=... rustotron-x86_64-apple-darwin.tar.gz`
# to confirm provenance.
ssldotcom-windows-sign = "test"  # placeholder — Windows post-v1
github-attestations = true       # the sigstore-flavoured one (TASK-401 AC)

# Build profile to use for release artefacts. Inherits release with LTO
# already enabled; cargo-dist passes --profile dist when invoking cargo.
dist-profile = "dist"

# Release announce — auto-generates a changelog from commits between tags.
changelog-aware = true

# ─────────────────────────────────────────────────────────────────────
# Bootstrap commands (run once after editing this file):
#
#   cargo install cargo-dist --version 0.21.1
#   cargo dist init                # writes .github/workflows/release.yml
#   cargo dist generate            # refreshes generated files
#   cargo dist plan                # dry-run a release locally
#
# Then push a tag to actually cut a release:
#
#   git tag -a v0.1.0 -m "v0.1.0 — initial release"
#   git push origin v0.1.0
#
# The workflow at .github/workflows/release.yml takes over from there.
# ─────────────────────────────────────────────────────────────────────
